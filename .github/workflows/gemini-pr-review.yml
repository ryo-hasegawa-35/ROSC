name: Gemini PR Review Assistant

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional pull request number to review"
        required: false
      force:
        description: "Re-run even if the latest confused reaction was already processed"
        required: false
        default: "false"

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: gemini-pr-review-assistant
  cancel-in-progress: false

jobs:
  review:
    name: gemini-pr-review
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Gemini review assistant
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REVIEW_TRIGGER_USER: ${{ vars.REVIEW_TRIGGER_USER }}
          REVIEW_MODEL: ${{ vars.REVIEW_MODEL }}
          REVIEW_MAX_FILES: ${{ vars.REVIEW_MAX_FILES }}
          REVIEW_MAX_PATCH_CHARS: ${{ vars.REVIEW_MAX_PATCH_CHARS }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: node .github/scripts/gemini-pr-review.mjs
