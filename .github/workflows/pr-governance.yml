name: PR Governance

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  pr-body-policy:
    name: pr-body-policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const requiredHeadings = [
              "## Summary",
              "## Linked Issues",
              "## Design Docs Affected",
              "## Compatibility Impact",
              "## Evidence",
              "## Rollback Plan",
              "## Checklist"
            ];

            const missing = requiredHeadings.filter(h => !body.includes(h));
            const hasIssueLink = /(close[sd]?|fix(e[sd])?|resolve[sd]?|related to|refs?)\s+#\d+/i.test(body);

            const problems = [];
            if (missing.length) {
              problems.push(`Missing required section(s): ${missing.join(", ")}`);
            }
            if (!hasIssueLink) {
              problems.push("PR body must link at least one issue using phrases like 'Closes #123' or 'Related to #123'.");
            }

            if (problems.length) {
              core.setFailed(problems.join("\n"));
            }
